<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="terminalGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b26;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16161e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="titleBarGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#24283b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1b26;stop-opacity:1" />
    </linearGradient>
    <style>
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
      .spinner {
        animation: spin 1s linear infinite;
        transform-origin: center;
      }
      .cursor {
        animation: pulse 1s ease-in-out infinite;
      }
    </style>
  </defs>
  
  <!-- 主终端窗口 -->
  <rect x="50" y="30" width="700" height="440" rx="10" ry="10" 
        fill="url(#terminalGradient)" stroke="#414868" stroke-width="1" 
        filter="url(#shadow)"/>
  
  <!-- 标题栏 -->
  <rect x="50" y="30" width="700" height="40" rx="10" ry="10" 
        fill="url(#titleBarGradient)"/>
  <rect x="50" y="50" width="700" height="20" fill="url(#titleBarGradient)"/>
  
  <!-- 窗口控制点 -->
  <circle cx="80" cy="50" r="6" fill="#f7768e"/> <!-- 红色 -->
  <circle cx="100" cy="50" r="6" fill="#e0af68"/> <!-- 黄色 -->
  <circle cx="120" cy="50" r="6" fill="#9ece6a"/> <!-- 绿色 -->
  
  <!-- 标题文本 -->
  <text x="400" y="55" font-family="monospace" font-size="14" 
        fill="#a9b1d6" text-anchor="middle" font-weight="bold">opencode</text>
  
  <!-- 终端内容区域 -->
  <rect x="70" y="80" width="660" height="380" fill="transparent"/>
  
  <!-- 用户提示行 -->
  <text x="80" y="110" font-family="monospace" font-size="16" fill="#7aa2f7">
    <tspan fill="#9ece6a">❯</tspan> <tspan fill="#c0caf5">创建一个React组件</tspan>
  </text>
  
  <!-- 分隔线 -->
  <line x1="80" y1="125" x2="740" y2="125" stroke="#3b4261" stroke-width="1"/>
  
  <!-- AI思考状态 -->
  <g transform="translate(80, 145)">
    <circle cx="10" cy="10" r="8" fill="none" stroke="#7dcfff" stroke-width="2" 
            stroke-dasharray="12.56 12.56" class="spinner"/>
    <text x="30" y="15" font-family="monospace" font-size="14" fill="#7dcfff">
      正在思考...
    </text>
  </g>
  
  <!-- AI响应内容 -->
  <g transform="translate(80, 180)">
    <!-- 中文响应 -->
    <text x="0" y="0" font-family="monospace" font-size="14" fill="#c0caf5">
      我来帮你创建一个React组件
    </text>
    
    <!-- 代码块开始 -->
    <rect x="-10" y="15" width="640" height="250" rx="5" ry="5" 
          fill="#1a1b26" stroke="#3b4261" stroke-width="1"/>
    
    <!-- 代码内容 -->
    <text x="10" y="35" font-family="monospace" font-size="13">
      <tspan fill="#bb9af7">import</tspan> <tspan fill="#c0caf5">React</tspan> <tspan fill="#bb9af7">from</tspan> <tspan fill="#9ece6a">'react'</tspan><tspan fill="#c0caf5">;</tspan>
    </text>
    <text x="10" y="55" font-family="monospace" font-size="13">
      <tspan fill="#bb9af7">import</tspan> <tspan fill="#c0caf5">{ useState }</tspan> <tspan fill="#bb9af7">from</tspan> <tspan fill="#9ece6a">'react'</tspan><tspan fill="#c0caf5">;</tspan>
    </text>
    <text x="10" y="75" font-family="monospace" font-size="13"> </text>
    <text x="10" y="95" font-family="monospace" font-size="13">
      <tspan fill="#bb9af7">const</tspan> <tspan fill="#7aa2f7">Counter</tspan> <tspan fill="#c0caf5">= () =&gt; {</tspan>
    </text>
    <text x="10" y="115" font-family="monospace" font-size="13">
      <tspan fill="#c0caf5">  </tspan><tspan fill="#bb9af7">const</tspan> <tspan fill="#c0caf5">[count, setCount] = </tspan><tspan fill="#7dcfff">useState</tspan><tspan fill="#c0caf5">(</tspan><tspan fill="#ff9e64">0</tspan><tspan fill="#c0caf5">);</tspan>
    </text>
    <text x="10" y="135" font-family="monospace" font-size="13"> </text>
    <text x="10" y="155" font-family="monospace" font-size="13">
      <tspan fill="#c0caf5">  </tspan><tspan fill="#bb9af7">return</tspan> <tspan fill="#c0caf5">(</tspan>
    </text>
    <text x="10" y="175" font-family="monospace" font-size="13">
      <tspan fill="#c0caf5">    &lt;</tspan><tspan fill="#f7768e">div</tspan><tspan fill="#c0caf5">&gt;</tspan>
    </text>
    <text x="10" y="195" font-family="monospace" font-size="13">
      <tspan fill="#c0caf5">      &lt;</tspan><tspan fill="#f7768e">h1</tspan><tspan fill="#c0caf5">&gt;</tspan><tspan fill="#c0caf5">计数: {count}</tspan><tspan fill="#c0caf5">&lt;/</tspan><tspan fill="#f7768e">h1</tspan><tspan fill="#c0caf5">&gt;</tspan>
    </text>
    <text x="10" y="215" font-family="monospace" font-size="13">
      <tspan fill="#c0caf5">      &lt;</tspan><tspan fill="#f7768e">button</tspan> <tspan fill="#bb9af7">onClick</tspan><tspan fill="#c0caf5">={() =&gt; </tspan><tspan fill="#7dcfff">setCount</tspan><tspan fill="#c0caf5">(count + </tspan><tspan fill="#ff9e64">1</tspan><tspan fill="#c0caf5">)}&gt;</tspan>
    </text>
    <text x="10" y="235" font-family="monospace" font-size="13">
      <tspan fill="#c0caf5">        增加</tspan>
    </text>
    <text x="10" y="255" font-family="monospace" font-size="13">
      <tspan fill="#c0caf5">      &lt;/</tspan><tspan fill="#f7768e">button</tspan><tspan fill="#c0caf5">&gt;</tspan>
    </text>
    <text x="10" y="275" font-family="monospace" font-size="13">
      <tspan fill="#c0caf5">    &lt;/</tspan><tspan fill="#f7768e">div</tspan><tspan fill="#c0caf5">&gt;</tspan>
    </text>
    <text x="10" y="295" font-family="monospace" font-size="13">
      <tspan fill="#c0caf5">  );</tspan>
    </text>
    <text x="10" y="315" font-family="monospace" font-size="13">
      <tspan fill="#c0caf5">};</tspan>
    </text>
  </g>
  
  <!-- 代码块结束 -->
  
  <!-- 光标 -->
  <g transform="translate(80, 520)">
    <text x="0" y="0" font-family="monospace" font-size="16" fill="#7aa2f7" class="cursor">
      ❯ <rect x="20" y="-12" width="10" height="16" fill="#7aa2f7"/>
    </text>
  </g>
  
  <!-- 发光效果 -->
  <rect x="50" y="30" width="700" height="440" rx="10" ry="10" 
        fill="none" stroke="#7aa2f7" stroke-width="0.5" opacity="0.3" 
        filter="url(#glow)"/>
  
  <!-- 状态栏 -->
  <rect x="50" y="450" width="700" height="20" rx="0" ry="0" 
        fill="#16161e"/>
  <text x="80" y="464" font-family="monospace" font-size="11" fill="#565f89">
    opencode v1.0.0 | 按 Ctrl+C 退出
  </text>
  <text x="700" y="464" font-family="monospace" font-size="11" fill="#565f89" text-anchor="end">
    UTF-8 | LF
  </text>
</svg>