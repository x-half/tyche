<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" width="800" height="700">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stepGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="700" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="400" y="55" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#1e293b">OpenCode 安装流程</text>
  <text x="400" y="80" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#64748b">三分钟完成安装，立即开始使用</text>

  <!-- Badge: 无需 API Key -->
  <rect x="280" y="95" width="240" height="42" rx="21" fill="url(#badgeGrad)" filter="url(#shadow)"/>
  <text x="400" y="122" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#fff">🎉 无需 API Key</text>

  <!-- Timeline line -->
  <line x1="120" y1="175" x2="120" y2="610" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Step 1 -->
  <circle cx="120" cy="200" r="20" fill="url(#stepGrad)" filter="url(#shadow)"/>
  <text x="120" y="206" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#fff">1</text>
  <rect x="160" y="175" width="420" height="50" rx="10" fill="#fff" filter="url(#shadow)"/>
  <text x="180" y="196" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#1e293b">检测系统环境</text>
  <text x="180" y="216" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b">自动识别 macOS / Linux / Windows</text>
  <text x="620" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">~3秒</text>

  <!-- Checkmark 1 -->
  <circle cx="120" cy="265" r="10" fill="#10b981"/>
  <path d="M115 265 L118 268 L125 261" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Step 2 -->
  <circle cx="120" cy="310" r="20" fill="url(#stepGrad)" filter="url(#shadow)"/>
  <text x="120" y="316" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#fff">2</text>
  <rect x="160" y="285" width="420" height="50" rx="10" fill="#fff" filter="url(#shadow)"/>
  <text x="180" y="306" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#1e293b">下载 OpenCode</text>
  <text x="180" y="326" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b">一键下载对应平台的二进制文件</text>
  <text x="620" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">~5秒</text>

  <!-- Checkmark 2 -->
  <circle cx="120" cy="375" r="10" fill="#10b981"/>
  <path d="M115 375 L118 378 L125 371" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Step 3 -->
  <circle cx="120" cy="420" r="20" fill="url(#stepGrad)" filter="url(#shadow)"/>
  <text x="120" y="426" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#fff">3</text>
  <rect x="160" y="395" width="420" height="50" rx="10" fill="#fff" filter="url(#shadow)"/>
  <text x="180" y="416" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#1e293b">配置免费模型</text>
  <text x="180" y="436" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b">自动配置免费 AI 模型，无需手动设置</text>
  <text x="620" y="425" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">~2秒</text>

  <!-- Checkmark 3 -->
  <circle cx="120" cy="485" r="10" fill="#10b981"/>
  <path d="M115 485 L118 488 L125 481" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Step 4 -->
  <circle cx="120" cy="530" r="20" fill="url(#stepGrad)" filter="url(#shadow)"/>
  <text x="120" y="536" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#fff">4</text>
  <rect x="160" y="505" width="420" height="50" rx="10" fill="#fff" filter="url(#shadow)"/>
  <text x="180" y="526" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#1e293b">验证安装</text>
  <text x="180" y="546" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b">自动运行健康检查，确保一切正常</text>
  <text x="620" y="535" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">~3秒</text>

  <!-- Checkmark 4 -->
  <circle cx="120" cy="595" r="10" fill="#10b981"/>
  <path d="M115 595 L118 598 L125 591" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Step 5: Success -->
  <rect x="160" y="610" width="480" height="55" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="400" y="637" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#059669">🎉 完成！输入 opencode 开始使用</text>
  <text x="400" y="655" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b">终端输入 opencode 即可启动</text>

  <!-- Decorative elements -->
  <circle cx="750" cy="100" r="30" fill="#2563eb" opacity="0.05"/>
  <circle cx="50" cy="650" r="40" fill="#10b981" opacity="0.05"/>

  <!-- Footer -->
  <text x="400" y="690" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8">预计总耗时：约 13 秒</text>
</svg>